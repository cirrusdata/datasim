version: 2

project_name: datasim

before:
  hooks:
    - go mod tidy

builds:
  - id: datasim
    main: ./cmd/datasim
    binary: datasim
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - >-
        -s -w
        -X main.version={{ .Version }}
        -X main.commit={{ .Commit }}
        -X main.date={{ .Date }}
        -X main.repository=cirrusdata/datasim

archives:
  - id: release-archives
    ids:
      - datasim
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

source:
  enabled: false

release:
  draft: false
  prerelease: auto
  header: |
    ## Installing

    **Linux (amd64):**
    ```bash
    curl -sL https://github.com/cirrusdata/datasim/releases/download/{{ .Tag }}/datasim_{{ .Version }}_linux_amd64.tar.gz \
      | sudo tar xz -C /usr/local/bin datasim
    ```

    **Linux (arm64):**
    ```bash
    curl -sL https://github.com/cirrusdata/datasim/releases/download/{{ .Tag }}/datasim_{{ .Version }}_linux_arm64.tar.gz \
      | sudo tar xz -C /usr/local/bin datasim
    ```

    **Windows (amd64):**
    Download [datasim_{{ .Version }}_windows_amd64.zip](https://github.com/cirrusdata/datasim/releases/download/{{ .Tag }}/datasim_{{ .Version }}_windows_amd64.zip), extract it, and run `datasim.exe`.

    **Windows (arm64):**
    Download [datasim_{{ .Version }}_windows_arm64.zip](https://github.com/cirrusdata/datasim/releases/download/{{ .Tag }}/datasim_{{ .Version }}_windows_arm64.zip), extract it, and run `datasim.exe`.

    Verify the install:
    ```bash
    datasim version
    ```

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
