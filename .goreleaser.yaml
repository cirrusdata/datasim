version: 2

project_name: datasim

before:
  hooks:
    - go mod tidy

builds:
  - id: datasim
    main: ./cmd/datasim
    binary: datasim
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - >-
        -s -w
        -X github.com/cirrusdata/datasim/cmd/datasim.version={{ .Version }}
        -X github.com/cirrusdata/datasim/cmd/datasim.commit={{ .Commit }}
        -X github.com/cirrusdata/datasim/cmd/datasim.date={{ .Date }}
        -X github.com/cirrusdata/datasim/cmd/datasim.repository=cirrusdata/datasim

archives:
  - id: release-archives
    ids:
      - datasim
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

source:
  enabled: false

release:
  draft: false
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
